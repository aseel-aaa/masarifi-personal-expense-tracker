<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مصاريفي</title>
    <meta name="description" content="سجّل دخولك لإدارة مصاريفك الشخصية بسهولة وذكاء">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-container">
    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <div class="card login-card">
        <div class="logo">
            <span>💰</span>
            <span>مصاريفي</span>
        </div>
        <h1>أهلاً بك مجدداً</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 1.05rem;">أدر مصاريفك بسهولة وذكاء</p>
        
        <button class="google-btn" id="google-login-btn" onclick="loginWithGoogle()">
            <svg width="20" height="20" viewBox="0 0 48 48">
                <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
            </svg>
            تسجيل الدخول بواسطة Google
        </button>

        <div style="margin-top: 2rem; display: flex; align-items: center; gap: 0.75rem; justify-content: center;">
            <div style="height: 1px; width: 60px; background: var(--border);"></div>
            <span style="color: var(--text-muted); font-size: 0.8rem;">مصاريفك تحت السيطرة</span>
            <div style="height: 1px; width: 60px; background: var(--border);"></div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "http://localhost:8000";

        function loginWithGoogle() {
            const btn = document.getElementById('google-login-btn');
            btn.style.pointerEvents = 'none';
            btn.innerHTML = `
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="animation: spin 1s linear infinite;">
                    <circle cx="12" cy="12" r="10" stroke-dasharray="32" stroke-dashoffset="12"/>
                </svg>
                جاري التحويل...
            `;
            // Add spin animation
            const style = document.createElement('style');
            style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
            document.head.appendChild(style);
            
            setTimeout(() => {
                window.location.href = `${API_BASE_URL}/auth/google`;
            }, 400);
        }

        // Check if token exists in URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            localStorage.setItem('token', token);
            window.location.href = 'index.html';
        }

        // If already logged in
        if (localStorage.getItem('token')) {
            window.location.href = 'index.html';
        }

        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#818cf8', '#c084fc', '#34d399', '#fbbf24'];
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                particle.style.animationDuration = (Math.random() * 10 + 6) + 's';
                particle.style.animationDelay = (Math.random() * 8) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
    </script>
</body>
</html>
